# ─────────────────────────────────────────────────────────────
# GitOps Template — Deployment
# Copy file này vào service repo, đổi các giá trị <PLACEHOLDER>
#
# Service repo CI/CD sẽ:
#   1. Build Docker image, push lên GHCR
#   2. Clone dragon-k8s-config repo (dùng PAT DRAGON_K8S_PAT)
#   3. sed -i image tag trong file này
#   4. git commit & push → trigger deploy workflow
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <SERVICE_NAME>
  namespace: <NAMESPACE>             # dragon-develop | dragon-staging | dragon-production
  labels:
    app: <SERVICE_NAME>
    env: <ENV>                       # develop | staging | production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <SERVICE_NAME>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: <SERVICE_NAME>
        env: <ENV>
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: <SERVICE_NAME>
          # ↓ Dòng này được CI/CD cập nhật tự động — KHÔNG sửa tay
          image: ghcr.io/long1712578/<SERVICE_NAME>:<ENV>-latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: <ASPNETCORE_ENV>    # Development | Staging | Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
