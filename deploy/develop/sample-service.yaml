# ─────────────────────────────────────────────────────────────
# sample-service (CV Website)  |  ENV: develop
# Static HTML CV + OIDC JavaScript client
# Nginx serve static files + healthcheck
#
# Flow: User truy cập → chưa login → redirect SSO → login
#       → redirect callback → hiển thị CV
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
  namespace: dragon-develop
  labels:
    app: sample-service
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sample-service
        env: develop
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sample-service
          image: ghcr.io/long1712578/sample-service:develop-c3ba5849
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sample-service
  namespace: dragon-develop
  labels:
    app: sample-service
    env: develop
spec:
  selector:
    app: sample-service
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────
# Ingress — Cloudflare Tunnel route dragon-cv → nginx
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-service
  namespace: dragon-develop
  labels:
    app: sample-service
    env: develop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: dragon-cv.dragon.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-service
                port:
                  number: 80
