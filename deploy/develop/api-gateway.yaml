# ─────────────────────────────────────────────────────────────
# api-gateway  |  ENV: develop
# Image tag được cập nhật tự động bởi service repo CI/CD
# Pattern: ghcr.io/long1712578/<service>:<env>-<git-sha>
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        env: develop
    spec:
      # imagePullSecrets:
      #   - name: ghcr-secret       # Bật lại khi dùng image từ GHCR
      containers:
        - name: api-gateway
          # ↓ Placeholder image để test pipeline. Đổi lại khi có app .NET thật:
          #   image: ghcr.io/long1712578/dragon-api-gateway:develop-latest
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          # env:
          #   - name: ASPNETCORE_ENVIRONMENT
          #     value: Development
          #   - name: ASPNETCORE_URLS
          #     value: http://+:8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
  annotations: {}
    # Khi chuyển lại nginx, bật các annotation sau:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: traefik
  rules:
    - host: dev.api.dragon.local   # Đổi thành domain thực tế của bạn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
