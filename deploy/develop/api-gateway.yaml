# ─────────────────────────────────────────────────────────────
# api-gateway  |  ENV: develop
# Dragon API Gateway (Ocelot) — entry point duy nhất cho hệ thống
#
# Tất cả traffic từ internet đi qua:
#   Cloudflare Tunnel → K3s Traefik → api-gateway → downstream services
#
# Image tag được cập nhật tự động bởi service repo CI/CD
# Pattern: ghcr.io/long1712578/<service>:<env>-<git-sha>
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        env: develop
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api-gateway
          image: ghcr.io/long1712578/dragon-api-gateway:develop-2e1d50d6
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────
# Ingress — Traefik route từ domain → api-gateway Service
# Cloudflare Tunnel sẽ forward traffic tới domain này
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: dragon-develop
  labels:
    app: api-gateway
    env: develop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: sso.longdev.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
