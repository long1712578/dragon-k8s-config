apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragon-business
  namespace: dragon-develop
  labels:
    app: dragon-business
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dragon-business
  template:
    metadata:
      labels:
        app: dragon-business
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dragon-business
          image: ghcr.io/long1712578/dragon-business:develop-2524b49
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Redis
              value: redis-master.dragon-infra.svc.cluster.local:6379
            - name: SSO__Authority
              value: https://sso.longdev.store
            - name: ZaloPay__Key1
              value: "PcY2s5OPvJPO0tng9RYZBVO2aRdMJ35y" # ZaloPay sandbox public key
            - name: ZaloPay__Key2
              value: "kLtgPl8HHhfvMuDHPwKfgfsY4Ydm9eIz" # ZaloPay sandbox public key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi # Native AOT cực nhẹ nên 128MB là quá đủ
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dragon-business
  namespace: dragon-develop
spec:
  selector:
    app: dragon-business
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dragon-business
  namespace: dragon-develop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: payhub.longdev.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragon-business
                port:
                  number: 80
