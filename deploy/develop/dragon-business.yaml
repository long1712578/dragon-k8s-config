apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dragon-business-data
  namespace: dragon-develop
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragon-business
  namespace: dragon-develop
  labels:
    app: dragon-business
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dragon-business
  template:
    metadata:
      labels:
        app: dragon-business
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Fix quyền ghi cho user 1654 (chiseled non-root)
      initContainers:
        - name: fix-data-permissions
          image: busybox
          command: ["sh", "-c", "mkdir -p /data && chown -R 1654:1654 /data"]
          volumeMounts:
            - name: data-volume
              mountPath: /data
      containers:
        - name: dragon-business
          image: ghcr.io/long1712578/dragon-business:develop-2524b49
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              value: "Data Source=/app/Data/dragon.db"
            - name: ConnectionStrings__Redis
              value: redis-master.dragon-infra.svc.cluster.local:6379
            - name: SSO__Authority
              value: https://sso.longdev.store
            - name: ZaloPay__Key1
              value: "PcY2s5OPvJPO0tng9RYZBVO2aRdMJ35y" # ZaloPay sandbox public key
            - name: ZaloPay__Key2
              value: "kLtgPl8HHhfvMuDHPwKfgfsY4Ydm9eIz" # ZaloPay sandbox public key
          volumeMounts:
            - name: data-volume
              mountPath: /app/Data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: dragon-business-data
---
apiVersion: v1
kind: Service
metadata:
  name: dragon-business
  namespace: dragon-develop
spec:
  selector:
    app: dragon-business
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dragon-business
  namespace: dragon-develop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: payhub.longdev.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragon-business
                port:
                  number: 80
