apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dragon-business-data
  namespace: dragon-develop
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragon-business
  namespace: dragon-develop
  labels:
    app: dragon-business
    env: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dragon-business
  template:
    metadata:
      labels:
        app: dragon-business
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # fsGroup: k8s tự chown volume mount về group 1654 — không cần initContainer
      securityContext:
        fsGroup: 1654
        runAsUser: 1654
        runAsGroup: 1654
        runAsNonRoot: true
      containers:
        - name: dragon-business
          image: ghcr.io/long1712578/dragon-business:develop-7900409
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1654
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              value: "Data Source=/app/Data/dragon.db"
            - name: ConnectionStrings__Redis
              value: redis-master.dragon-develop.svc.cluster.local:6379
            - name: SSO__Authority
              value: https://sso.longdev.store
            - name: ZaloPay__AppId
              value: "2553"
            - name: ZaloPay__Key1
              value: "9ph3199y9th6883v69h761b7z6n83pzed"
            - name: ZaloPay__Key2
              value: "Iyz2unPNSW0S1ge9df9uPaLqy0S89S6O"
            - name: ZaloPay__Endpoint
              value: "https://sb-openapi.zalopay.vn/v2/create"
          volumeMounts:
            - name: data-volume
              mountPath: /app/Data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: dragon-business-data
---
apiVersion: v1
kind: Service
metadata:
  name: dragon-business
  namespace: dragon-develop
spec:
  selector:
    app: dragon-business
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dragon-business
  namespace: dragon-develop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: payhub.longdev.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragon-business
                port:
                  number: 80
