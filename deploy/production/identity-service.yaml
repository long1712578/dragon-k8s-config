apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: dragon-production
  labels:
    app: identity-service
    env: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: identity-service
        env: production
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: identity-service
          image: ghcr.io/long1712578/identity-service:production-latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: App__SelfUrl
              value: https://api.dragon.io
            - name: App__CorsOrigins
              value: https://api.dragon.io,https://cv.dragon.io
            - name: AuthServer__Authority
              value: https://api.dragon.io
            - name: AuthServer__RequireHttpsMetadata
              value: "true"
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: identity-service-secrets
                  key: connection-string
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: dragon-production
  labels:
    app: identity-service
    env: production
spec:
  selector:
    app: identity-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP